name: Publish to npm

on:
  push:
    branches:
      - main
      - master
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump type (patch, minor, major) or specific version'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
          - specific
          - none
      specific_version:
        description: 'Specific version (only used if "specific" is selected above)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != 'none'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Bump version (Manual Run)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != 'none'
        run: |
          if [ "${{ github.event.inputs.version }}" = "specific" ]; then
            if [ -z "${{ github.event.inputs.specific_version }}" ]; then
              echo "Error: specific_version input is required when version is set to specific"
              exit 1
            fi
            npm version ${{ github.event.inputs.specific_version }} -m "chore(release): bump version to %s [skip ci]"
          else
            npm version ${{ github.event.inputs.version }} -m "chore(release): bump version to %s [skip ci]"
          fi

      - name: Push version bump
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != 'none'
        run: |
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Publish to npm
        run: node npmPublish.js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
