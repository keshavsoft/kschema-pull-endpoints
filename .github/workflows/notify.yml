name: Notify Post Actions

on:
  workflow_run:
    workflows: ["Publish to npm"]
    types:
      - completed
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only run automatically if the triggered workflow completed successfully,
    # or if it was triggered manually (workflow_dispatch).
    if: ${{ github.event.workflow_run == null || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('./package.json', 'utf8')).version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Notify kschema-fs-api-gen-post-actions
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "Warning: DISPATCH_TOKEN secret is not set. Skipping notification."
            exit 0
          fi
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/keshavsoft/kschema-fs-api-gen-post-actions/dispatches \
            -d "{\"event_type\": \"publish-success\", \"client_payload\": {\"package\": \"kschema-fs-api-gen-rest\", \"version\": \"${{ steps.get_version.outputs.version }}\"}}"
